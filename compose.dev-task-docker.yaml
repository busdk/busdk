# Local development stack for bus dev task -> provider-neutral containers ->
# bus-integration-containers -> bus.docker.* local Docker execution. This
# file uses only non-secret development defaults.
#
# Start:
#   docker compose -f compose.dev-task-docker.yaml up --build -d
#
# Open a testing shell:
#   docker compose -f compose.dev-task-docker.yaml exec testing-agent sh
#
# In that shell, create and watch a task:
#   cd /workspace/bus-dev
#   go run ./cmd/bus-dev task new @bus-dev "Reply hello from a Docker-backed task container."
#   go run ./cmd/bus-dev task watch <printed-task-ref> --timeout 5m
#
# Check the supervisor heartbeat service:
#   docker compose -f compose.dev-task-docker.yaml exec bus-dev-supervisor \
#     /workspace/scripts/dev-task-supervisor-heartbeat.sh check
#   docker compose -f compose.dev-task-docker.yaml exec bus-dev-supervisor \
#     /workspace/scripts/dev-task-supervisor-heartbeat.sh inspect
#
# Run the container API directly:
#   cd /workspace/bus-containers
#   go run ./cmd/bus-containers run --profile codex -- codex --version

x-codex-image-build: &codex-image-build
  context: ./deploy/local-ai-platform/codex
  args:
    CODEX_NPM_PACKAGE: ${BUS_LOCAL_CODEX_NPM_PACKAGE:-@openai/codex}
    CODEX_NPM_VERSION: ${BUS_LOCAL_CODEX_NPM_VERSION:-0.128.0}

services:
  codex-image:
    image: ${DOCKER_CONTAINER_CODEX_IMAGE:-bus-local-codex:dev}
    pull_policy: build
    build: *codex-image-build
    command:
      - codex
      - --version

  bus-events:
    image: golang:1.24
    working_dir: /workspace/bus-api-provider-events
    environment:
      PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_EVENTS_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_TRACE: ${BUS_EVENTS_TRACE:-false}
    command:
      - sh
      - -c
      - >-
        go run ./cmd/bus-api-provider-events
        --addr 0.0.0.0:8081
        --events-backend memory
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - .:/workspace

  postgres:
    image: ${BUS_LOCAL_POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: ${LOCAL_AI_PLATFORM_POSTGRES_USER:-bus}
      POSTGRES_PASSWORD: ${LOCAL_AI_PLATFORM_POSTGRES_PASSWORD:-bus}
      POSTGRES_DB: ${LOCAL_AI_PLATFORM_POSTGRES_DB:-bus_local}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - dev-task-postgres:/var/lib/postgresql/data

  bus-notes-api:
    image: golang:1.24
    working_dir: /workspace/bus-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_API_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_DATA_POSTGRES_DSN: postgres://${LOCAL_AI_PLATFORM_POSTGRES_USER:-bus}:${LOCAL_AI_PLATFORM_POSTGRES_PASSWORD:-bus}@postgres:5432/${LOCAL_AI_PLATFORM_POSTGRES_DB:-bus_local}?sslmode=disable
      BUS_NOTES_WORKSPACE_ROOT: ${BUS_NOTES_WORKSPACE_ROOT:-/workspace/tmp/dev-task/notes-workspace}
    command:
      - sh
      - -c
      - >-
        go run -tags 'busdk_notes,busdk_concrete,busdk_busdata'
        ./cmd/bus-api serve
        --listen 0.0.0.0
        --port 8092
        --token local-dev
        --provider notes
        --enable-module notes
    ports:
      - "127.0.0.1:8092:8092"
    volumes:
      - .:/workspace

  bus-api-provider-containers:
    image: golang:1.24
    working_dir: /workspace/bus-api-provider-containers
    depends_on:
      - bus-events
    environment:
      PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_LOCAL_ACCOUNT_ID: ${BUS_LOCAL_ACCOUNT_ID:-00000000-0000-4000-8000-000000000001}
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_CONTAINERS_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
    command:
      - sh
      - -c
      - >-
        export BUS_API_TOKEN="$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject "$${BUS_LOCAL_ACCOUNT_ID}"
        --audience ai.hg.fi/api
        --scope 'container:read container:run container:delete container:admin usage:read billing:read'
        --ttl 12h)" &&
        go run ./cmd/bus-api-provider-containers
        --addr 0.0.0.0:8080
        --backend events
        --usage-backend memory
        --events-url http://bus-events:8081
        --timeout 30m
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/workspace

  bus-integration-docker:
    image: golang:1.24
    working_dir: /workspace/bus-integration-docker
    depends_on:
      codex-image:
        condition: service_completed_successfully
      bus-events:
        condition: service_started
      bus-notes-api:
        condition: service_started
    environment:
      PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_LOCAL_ACCOUNT_ID: ${BUS_LOCAL_ACCOUNT_ID:-00000000-0000-4000-8000-000000000001}
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_DOCKER_PROVIDER: docker
      BUS_DOCKER_EVENT_PREFIX: bus.docker
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_CONTAINER_CODEX_IMAGE: ${DOCKER_CONTAINER_CODEX_IMAGE:-bus-local-codex:dev}
      BUS_DOCKER_CODEX_HOME_HOST: ${BUS_DOCKER_CODEX_HOME_HOST:-${BUS_CODEX_HOME:-${HOME}/.codex}}
      BUS_DOCKER_CODEX_HOME_WRITABLE: ${BUS_DOCKER_CODEX_HOME_WRITABLE:-false}
      BUS_DOCKER_CODEX_SSH_HOST: ${BUS_DOCKER_CODEX_SSH_HOST:-${HOME}/.ssh}
      BUS_DOCKER_CODEX_SSH_AGENT_HOST: ${BUS_DOCKER_CODEX_SSH_AGENT_HOST:-${SSH_AUTH_SOCK:-}}
      BUS_DOCKER_CODEX_GIT_SSH_COMMAND: ${BUS_DOCKER_CODEX_GIT_SSH_COMMAND:-ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/bus-known-hosts}
      BUS_DOCKER_CODEX_WORKSPACE_HOST: ${BUS_DOCKER_CODEX_WORKSPACE_HOST:-${PWD}}
      BUS_DOCKER_CODEX_WORKSPACE_CONTAINER: ${BUS_DOCKER_CODEX_WORKSPACE_CONTAINER:-/workspace}
    command:
      - sh
      - -c
      - >-
        export BUS_API_TOKEN="$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject "$${BUS_LOCAL_ACCOUNT_ID}"
        --audience ai.hg.fi/api
        --scope 'events:send events:listen container:read container:run container:delete container:admin'
        --ttl 12h)" &&
        go run ./cmd/bus-integration-docker
        --provider docker
        --events-url http://bus-events:8081
        --event-prefix bus.docker
        --container-codex-image "$${DOCKER_CONTAINER_CODEX_IMAGE}"
        --codex-home-host-path "$${BUS_DOCKER_CODEX_HOME_HOST}"
        $$(if [ "$${BUS_DOCKER_CODEX_HOME_WRITABLE}" = "true" ] ||
        [ "$${BUS_DOCKER_CODEX_HOME_WRITABLE}" = "1" ]; then
        printf '%s' '--codex-home-writable'; fi)
        --codex-ssh-host-path "$${BUS_DOCKER_CODEX_SSH_HOST}"
        --codex-ssh-agent-host-path "$${BUS_DOCKER_CODEX_SSH_AGENT_HOST}"
        --codex-git-ssh-command "$${BUS_DOCKER_CODEX_GIT_SSH_COMMAND}"
        --codex-workspace-host-path "$${BUS_DOCKER_CODEX_WORKSPACE_HOST}"
        --codex-workspace-container-path "$${BUS_DOCKER_CODEX_WORKSPACE_CONTAINER}"
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  bus-integration-containers:
    image: golang:1.24
    working_dir: /workspace/bus-integration-containers
    depends_on:
      - bus-events
      - bus-integration-docker
    environment:
      PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_LOCAL_ACCOUNT_ID: ${BUS_LOCAL_ACCOUNT_ID:-00000000-0000-4000-8000-000000000001}
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_CONTAINERS_PROVIDER: events
      BUS_CONTAINERS_BACKEND_EVENT_PREFIX: bus.docker
      BUS_CONTAINERS_REQUEST_TIMEOUT: 30m
    command:
      - sh
      - -c
      - >-
        export BUS_API_TOKEN="$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject "$${BUS_LOCAL_ACCOUNT_ID}"
        --audience ai.hg.fi/api
        --scope 'events:listen dev:task:read container:read container:run container:delete container:admin'
        --ttl 12h)" &&
        go run ./cmd/bus-integration-containers
        --provider events
        --events-url http://bus-events:8081
        --backend-event-prefix bus.docker
        --request-timeout 30m
    volumes:
      - .:/workspace

  bus-integration-dev-task:
    image: ${DOCKER_CONTAINER_CODEX_IMAGE:-bus-local-codex:dev}
    pull_policy: build
    build: *codex-image-build
    working_dir: /workspace/bus-integration-dev-task
    depends_on:
      codex-image:
        condition: service_completed_successfully
      bus-events:
        condition: service_started
      bus-api-provider-containers:
        condition: service_started
      bus-integration-containers:
        condition: service_started
      bus-integration-docker:
        condition: service_started
    environment:
      PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_LOCAL_ACCOUNT_ID: ${BUS_LOCAL_ACCOUNT_ID:-00000000-0000-4000-8000-000000000001}
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_NOTES_API_URL: ${BUS_NOTES_API_URL:-http://bus-notes-api:8092/local-dev/v1}
      BUS_API_URL: ${BUS_API_URL:-http://bus-notes-api:8092/local-dev/v1}
      BUS_DEV_TASK_POLICY_FILE: ${BUS_DEV_TASK_POLICY_FILE:-/workspace/config/dev-task-lifecycle-policy.json}
      BUS_DEV_TASK_RECIPIENT: ${BUS_DEV_TASK_RECIPIENT:-}
      BUS_DEV_TASK_AGENT_BACKEND: ${BUS_DEV_TASK_AGENT_BACKEND:-codex-appserver}
      BUS_DEV_TASK_CODEX_COMMAND: ${BUS_DEV_TASK_CODEX_COMMAND:-codex}
      BUS_DEV_TASK_CODEX_ARGS: ${BUS_DEV_TASK_CODEX_ARGS:-["app-server","-c","approval_policy=\"never\"","-c","shell_environment_policy.inherit=all","-c","sandbox_mode=\"workspace-write\"","-c","sandbox_workspace_write.network_access=true"]}
      BUS_DEV_TASK_CODEX_MODEL: ${BUS_DEV_TASK_CODEX_MODEL:-auto}
      BUS_DEV_TASK_CODEX_APPROVAL_POLICY: ${BUS_DEV_TASK_CODEX_APPROVAL_POLICY:-never}
      BUS_DEV_TASK_CODEX_SANDBOX: ${BUS_DEV_TASK_CODEX_SANDBOX:-workspace-write}
      BUS_DEV_TASK_CODEX_NETWORK_ACCESS: ${BUS_DEV_TASK_CODEX_NETWORK_ACCESS:-true}
      BUS_DEV_TASK_CODEX_SOURCE_HOME: ${BUS_DEV_TASK_CODEX_SOURCE_HOME:-/root/.codex-shared}
      BUS_DEV_TASK_CODEX_STATE_ROOT: ${BUS_DEV_TASK_CODEX_STATE_ROOT:-/workspace/tmp/bus-dev-task-codex-homes}
      BUS_DEV_TASK_CODEX_INHERIT_ENV: ${BUS_DEV_TASK_CODEX_INHERIT_ENV:-true}
      BUS_DEV_TASK_GO_DEBUGGER: ${BUS_DEV_TASK_GO_DEBUGGER:-auto}
      BUS_DEV_TASK_GO_DEBUGGER_COMMAND: ${BUS_DEV_TASK_GO_DEBUGGER_COMMAND:-dlv}
      BUS_LINT_AGENT: ${BUS_LINT_AGENT:-codex}
      BUS_DEV_TASK_CONTAINER_PROFILE: codex
      BUS_DEV_TASK_WORKSPACE_ROOT: ${BUS_DEV_TASK_WORKSPACE_ROOT:-/workspace}
      BUS_DEV_TASK_WORKSPACE_HOST_ROOT: ${BUS_DEV_TASK_WORKSPACE_HOST_ROOT:-${PWD}}
      BUS_DEV_TASK_WORKSPACE_RECIPIENT: ${BUS_DEV_TASK_WORKSPACE_RECIPIENT:-busdk}
      BUS_DEV_TASK_WORKTREE: ${BUS_DEV_TASK_WORKTREE:-true}
      BUS_DEV_TASK_WORKTREE_ROOT: ${BUS_DEV_TASK_WORKTREE_ROOT:-/workspace/tmp/bus-dev-task-worktrees}
      BUS_DEV_TASK_COMMAND_JSON: "[]"
      BUS_DEV_TASK_PRE_COMMAND_JSON: ${BUS_DEV_TASK_PRE_COMMAND_JSON:-[]}
      BUS_DEV_TASK_POST_COMMAND_JSON: "[]"
      BUS_DEV_TASK_COMMIT: "true"
      BUS_DEV_TASK_COMMIT_MESSAGE: |-
        task: {summary}

        Task: {text}

        Work-ref: {work_ref}
        Recipient: {recipient}

        Verification: See task closeout evidence and supervisor review before promotion.

        Compatibility: Review required; bridge did not classify compatibility impact.

        Migration: Review required; bridge did not classify data, schema, or config migration impact.

        Security: Review required; bridge did not classify security or privacy impact.
      BUS_DEV_TASK_TIMEOUT: ${BUS_DEV_TASK_TIMEOUT:-30m}
      BUS_DEV_TASK_ONCE: ${BUS_DEV_TASK_ONCE:-false}
      BUS_DEV_TASK_IDLE_TIMEOUT: ${BUS_DEV_TASK_IDLE_TIMEOUT:-0}
      BUS_DEV_TASK_TRACE: ${BUS_DEV_TASK_TRACE:-false}
      DOCKER_HOST: unix:///var/run/docker.sock
      BUS_E2E_DOCKER_HOST: ${BUS_E2E_DOCKER_HOST:-host.docker.internal}
      GOCACHE: ${BUS_DEV_TASK_GOCACHE:-/tmp/bus-go-build-cache}
      GOMODCACHE: ${BUS_DEV_TASK_GOMODCACHE:-/go/pkg/mod}
      GOPATH: ${BUS_DEV_TASK_GOPATH:-/go}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -c
      - >-
        /workspace/scripts/busdk-refresh-tools.sh --refresh-only;
        if [ -z "$${CODEX_HOME:-}" ]; then
        export CODEX_HOME="/tmp/codex-home-$${BUS_DEV_TASK_RECIPIENT:-worker}-$${HOSTNAME:-local}";
        mkdir -p "$${CODEX_HOME}";
        for codex_file in auth.json config.toml; do
        if [ -f "$${BUS_DEV_TASK_CODEX_SOURCE_HOME}/$${codex_file}" ]; then
        cp "$${BUS_DEV_TASK_CODEX_SOURCE_HOME}/$${codex_file}" "$${CODEX_HOME}/$${codex_file}";
        chmod 600 "$${CODEX_HOME}/$${codex_file}" || true;
        fi;
        done;
        fi;
        if [ "$${BUS_DEV_TASK_AGENT_BACKEND}" = "codex-appserver" ]; then
        export BUS_DEV_TASK_COMMAND_JSON="[]";
        fi;
        if [ -z "$${BUS_API_TOKEN:-}" ]; then
        export BUS_API_TOKEN="$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject "$${BUS_LOCAL_ACCOUNT_ID}"
        --audience ai.hg.fi/api
        --scope 'events:send events:listen dev:task:send dev:task:read dev:task:reply dev:task:claim container:read container:run container:delete notes.write notes.read notes.search notes.import.memo_file notes.import.task_summary notes.import.session_summary'
        --ttl 12h)";
        fi;
        export BUS_NOTES_API_TOKEN="$${BUS_NOTES_API_TOKEN:-$${BUS_API_TOKEN}}" &&
        set -- go run ./cmd/bus-integration-dev-task
        --events-url http://bus-events:8081;
        if [ -n "$${BUS_DEV_TASK_RECIPIENT}" ]; then
        set -- "$$@" --recipient "$${BUS_DEV_TASK_RECIPIENT}";
        fi;
        if [ -n "$${BUS_DEV_TASK_POLICY_FILE:-}" ]; then
        set -- "$$@" --policy-file "$${BUS_DEV_TASK_POLICY_FILE}";
        fi;
        set -- "$$@"
        --agent-backend "$${BUS_DEV_TASK_AGENT_BACKEND}"
        --codex-command "$${BUS_DEV_TASK_CODEX_COMMAND}"
        --codex-args-json "$${BUS_DEV_TASK_CODEX_ARGS}"
        --codex-model "$${BUS_DEV_TASK_CODEX_MODEL}"
        --codex-approval-policy "$${BUS_DEV_TASK_CODEX_APPROVAL_POLICY}"
        --codex-sandbox "$${BUS_DEV_TASK_CODEX_SANDBOX}"
        --codex-network-access="$${BUS_DEV_TASK_CODEX_NETWORK_ACCESS}"
        --codex-state-root "$${BUS_DEV_TASK_CODEX_STATE_ROOT}"
        --codex-inherit-env="$${BUS_DEV_TASK_CODEX_INHERIT_ENV}"
        --go-debugger "$${BUS_DEV_TASK_GO_DEBUGGER}"
        --go-debugger-command "$${BUS_DEV_TASK_GO_DEBUGGER_COMMAND}"
        --container-profile "$${BUS_DEV_TASK_CONTAINER_PROFILE}"
        --workspace-root "$${BUS_DEV_TASK_WORKSPACE_ROOT}"
        --workspace-host-root "$${BUS_DEV_TASK_WORKSPACE_HOST_ROOT}"
        --workspace-recipient "$${BUS_DEV_TASK_WORKSPACE_RECIPIENT}"
        --worktree="$${BUS_DEV_TASK_WORKTREE}"
        --worktree-root "$${BUS_DEV_TASK_WORKTREE_ROOT}"
        --command-json "$${BUS_DEV_TASK_COMMAND_JSON}"
        --pre-command-json "$${BUS_DEV_TASK_PRE_COMMAND_JSON}"
        --post-command-json "$${BUS_DEV_TASK_POST_COMMAND_JSON}"
        --commit="$${BUS_DEV_TASK_COMMIT}"
        --commit-message "$${BUS_DEV_TASK_COMMIT_MESSAGE}"
        --timeout "$${BUS_DEV_TASK_TIMEOUT}"
        --once="$${BUS_DEV_TASK_ONCE}"
        --idle-timeout "$${BUS_DEV_TASK_IDLE_TIMEOUT}";
        exec "$$@"
    volumes:
      - .:/workspace
      - ${BUS_CODEX_HOME:-${HOME}/.codex}:/root/.codex-shared:ro
      - ${BUS_GO_MOD_CACHE_HOST:-${HOME}/go/pkg/mod}:/go/pkg/mod:ro
      - /var/run/docker.sock:/var/run/docker.sock

  bus-dev-supervisor:
    image: golang:1.24
    working_dir: /workspace
    depends_on:
      bus-events:
        condition: service_started
      bus-integration-dev-task:
        condition: service_started
    environment:
      PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_LOCAL_ACCOUNT_ID: ${BUS_LOCAL_ACCOUNT_ID:-00000000-0000-4000-8000-000000000001}
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_DEV_SUPERVISOR_STATE_DIR: ${BUS_DEV_SUPERVISOR_STATE_DIR:-/workspace/tmp/dev-task-supervisor}
      BUS_DEV_SUPERVISOR_INTERVAL_SECONDS: ${BUS_DEV_SUPERVISOR_INTERVAL_SECONDS:-300}
      BUS_DEV_SUPERVISOR_MAX_AGE_SECONDS: ${BUS_DEV_SUPERVISOR_MAX_AGE_SECONDS:-900}
      BUS_DEV_SUPERVISOR_QUIET_AFTER: ${BUS_DEV_SUPERVISOR_QUIET_AFTER:-15m}
      BUS_DEV_SUPERVISOR_STALE_AFTER: ${BUS_DEV_SUPERVISOR_STALE_AFTER:-1h}
      BUS_DEV_SUPERVISOR_ONCE: ${BUS_DEV_SUPERVISOR_ONCE:-false}
    command:
      - sh
      - -c
      - >-
        /workspace/scripts/busdk-refresh-tools.sh --refresh-only &&
        mkdir -p /root/.config/bus/auth &&
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject "$${BUS_LOCAL_ACCOUNT_ID}"
        --audience ai.hg.fi/api
        --scope 'events:send events:listen dev:task:send dev:task:read dev:task:reply dev:task:claim'
        --ttl 12h)" &&
        printf '%s\n' "$${BUS_API_TOKEN}" > /root/.config/bus/auth/api-token &&
        exec /workspace/scripts/dev-task-supervisor-heartbeat.sh run
    healthcheck:
      test: ["CMD-SHELL", "/workspace/scripts/dev-task-supervisor-heartbeat.sh check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - .:/workspace

  testing-agent:
    image: golang:1.24
    working_dir: /workspace
    depends_on:
      - bus-events
      - bus-api-provider-containers
      - bus-integration-dev-task
      - bus-dev-supervisor
    environment:
      PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_LOCAL_ACCOUNT_ID: ${BUS_LOCAL_ACCOUNT_ID:-00000000-0000-4000-8000-000000000001}
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_NOTES_API_URL: ${BUS_NOTES_API_URL:-http://bus-notes-api:8092/local-dev/v1}
      BUS_API_URL: ${BUS_API_URL:-http://bus-notes-api:8092/local-dev/v1}
      BUS_AI_API_URL: http://bus-api-provider-containers:8080
      BUS_CONFIG_DIR: /root/.config/bus
    command:
      - sh
      - -c
      - >-
        /workspace/scripts/busdk-refresh-tools.sh --refresh-only &&
        mkdir -p /root/.config/bus/auth &&
        cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject "$${BUS_LOCAL_ACCOUNT_ID}"
        --audience ai.hg.fi/api
        --scope 'events:send events:listen dev:task:send dev:task:read dev:task:reply dev:task:claim container:read container:run container:delete notes.write notes.read notes.search notes.import.memo_file notes.import.task_summary notes.import.session_summary'
        --ttl 12h > /root/.config/bus/auth/api-token &&
        sleep infinity
    volumes:
      - .:/workspace

volumes:
  dev-task-postgres:
