# Local development stack for bus dev task -> provider-neutral containers ->
# bus-integration-containers -> bus.docker.* local Docker execution. This
# file uses only non-secret development defaults.
#
# Start:
#   docker compose -f compose.dev-task-docker.yaml up --build -d
#
# Open a testing shell:
#   docker compose -f compose.dev-task-docker.yaml exec testing-agent sh
#
# In that shell, create and watch a task:
#   cd /workspace/bus-dev
#   go run ./cmd/bus-dev task new @bus-dev "Reply hello from a Docker-backed task container."
#   go run ./cmd/bus-dev task watch <printed-task-ref> --timeout 5m
#
# Run the container API directly:
#   cd /workspace/bus-containers
#   go run ./cmd/bus-containers run --profile codex -- codex --version

services:
  codex-image:
    image: ${DOCKER_CONTAINER_CODEX_IMAGE:-bus-local-codex:dev}
    build:
      context: ./deploy/local-ai-platform/codex
      args:
        CODEX_NPM_PACKAGE: ${BUS_LOCAL_CODEX_NPM_PACKAGE:-@openai/codex}
        CODEX_NPM_VERSION: ${BUS_LOCAL_CODEX_NPM_VERSION:-0.128.0}
    command:
      - codex
      - --version

  bus-events:
    image: golang:1.24
    working_dir: /workspace/bus-api-provider-events
    environment:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_EVENTS_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
    command:
      - sh
      - -c
      - >-
        go run ./cmd/bus-api-provider-events
        --addr 0.0.0.0:8081
        --events-backend memory
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - .:/workspace

  bus-api-provider-containers:
    image: golang:1.24
    working_dir: /workspace/bus-api-provider-containers
    depends_on:
      - bus-events
    environment:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_CONTAINERS_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
    command:
      - sh
      - -c
      - >-
        export BUS_API_TOKEN="$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject local-dev
        --audience ai.hg.fi/api
        --scope 'container:read container:run container:delete container:admin usage:read billing:read'
        --ttl 12h)" &&
        go run ./cmd/bus-api-provider-containers
        --addr 0.0.0.0:8080
        --backend events
        --usage-backend memory
        --events-url http://bus-events:8081
        --timeout 30m
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/workspace

  bus-integration-docker:
    image: golang:1.24
    working_dir: /workspace/bus-integration-docker
    depends_on:
      codex-image:
        condition: service_completed_successfully
      bus-events:
        condition: service_started
    environment:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_DOCKER_PROVIDER: docker
      BUS_DOCKER_EVENT_PREFIX: bus.docker
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_CONTAINER_CODEX_IMAGE: ${DOCKER_CONTAINER_CODEX_IMAGE:-bus-local-codex:dev}
      BUS_DOCKER_CODEX_HOME_HOST: ${BUS_DOCKER_CODEX_HOME_HOST:-${BUS_CODEX_HOME:-${HOME}/.codex}}
      BUS_DOCKER_CODEX_HOME_WRITABLE: ${BUS_DOCKER_CODEX_HOME_WRITABLE:-true}
      BUS_DOCKER_CODEX_SSH_HOST: ${BUS_DOCKER_CODEX_SSH_HOST:-${HOME}/.ssh}
      BUS_DOCKER_CODEX_SSH_AGENT_HOST: ${BUS_DOCKER_CODEX_SSH_AGENT_HOST:-${SSH_AUTH_SOCK:-}}
      BUS_DOCKER_CODEX_GIT_SSH_COMMAND: ${BUS_DOCKER_CODEX_GIT_SSH_COMMAND:-ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/bus-known-hosts}
      BUS_DOCKER_CODEX_WORKSPACE_HOST: ${BUS_DOCKER_CODEX_WORKSPACE_HOST:-${PWD}}
      BUS_DOCKER_CODEX_WORKSPACE_CONTAINER: ${BUS_DOCKER_CODEX_WORKSPACE_CONTAINER:-/workspace}
    command:
      - sh
      - -c
      - >-
        export BUS_API_TOKEN="$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject local-dev
        --audience ai.hg.fi/api
        --scope 'container:read container:run container:delete container:admin'
        --ttl 12h)" &&
        go run ./cmd/bus-integration-docker
        --provider docker
        --events-url http://bus-events:8081
        --event-prefix bus.docker
        --container-codex-image "$${DOCKER_CONTAINER_CODEX_IMAGE}"
        --codex-home-host-path "$${BUS_DOCKER_CODEX_HOME_HOST}"
        $$(if [ "$${BUS_DOCKER_CODEX_HOME_WRITABLE}" = "true" ] ||
        [ "$${BUS_DOCKER_CODEX_HOME_WRITABLE}" = "1" ]; then
        printf '%s' '--codex-home-writable'; fi)
        --codex-ssh-host-path "$${BUS_DOCKER_CODEX_SSH_HOST}"
        --codex-ssh-agent-host-path "$${BUS_DOCKER_CODEX_SSH_AGENT_HOST}"
        --codex-git-ssh-command "$${BUS_DOCKER_CODEX_GIT_SSH_COMMAND}"
        --codex-workspace-host-path "$${BUS_DOCKER_CODEX_WORKSPACE_HOST}"
        --codex-workspace-container-path "$${BUS_DOCKER_CODEX_WORKSPACE_CONTAINER}"
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  bus-integration-containers:
    image: golang:1.24
    working_dir: /workspace/bus-integration-containers
    depends_on:
      - bus-events
      - bus-integration-docker
    environment:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_CONTAINERS_PROVIDER: events
      BUS_CONTAINERS_BACKEND_EVENT_PREFIX: bus.docker
      BUS_CONTAINERS_REQUEST_TIMEOUT: 30m
    command:
      - sh
      - -c
      - >-
        export BUS_API_TOKEN="$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject local-dev
        --audience ai.hg.fi/api
        --scope 'container:read container:run container:delete container:admin'
        --ttl 12h)" &&
        go run ./cmd/bus-integration-containers
        --provider events
        --events-url http://bus-events:8081
        --backend-event-prefix bus.docker
        --request-timeout 30m
    volumes:
      - .:/workspace

  bus-integration-dev-task:
    image: golang:1.24
    working_dir: /workspace/bus-integration-dev-task
    depends_on:
      - bus-events
      - bus-api-provider-containers
      - bus-integration-containers
      - bus-integration-docker
    environment:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_DEV_TASK_RECIPIENT: ${BUS_DEV_TASK_RECIPIENT:-}
      BUS_DEV_TASK_CONTAINER_PROFILE: codex
      BUS_DEV_TASK_WORKSPACE_ROOT: ${BUS_DEV_TASK_WORKSPACE_ROOT:-/workspace}
      BUS_DEV_TASK_COMMAND_JSON: ${BUS_DEV_TASK_COMMAND_JSON:-["codex","exec","--skip-git-repo-check","--sandbox","danger-full-access","{prompt}"]}
      BUS_DEV_TASK_PRE_COMMAND_JSON: ${BUS_DEV_TASK_PRE_COMMAND_JSON:-[]}
      BUS_DEV_TASK_POST_COMMAND_JSON: ${BUS_DEV_TASK_POST_COMMAND_JSON:-["sh","-c","cd {repo_path} && git add . && (git diff --cached --quiet || git -c user.name=BusDevTask -c user.email=bus-dev-task@localhost commit -m chore:dev-task-{work_ref}) && git push -u origin {branch}"]}
    command:
      - sh
      - -c
      - >-
        export BUS_API_TOKEN="$(cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject local-dev
        --audience ai.hg.fi/api
        --scope 'dev:task:send dev:task:read dev:task:reply dev:task:claim container:read container:run container:delete'
        --ttl 12h)" &&
        go run ./cmd/bus-integration-dev-task
        --events-url http://bus-events:8081
        --recipient "$${BUS_DEV_TASK_RECIPIENT}"
        --container-profile "$${BUS_DEV_TASK_CONTAINER_PROFILE}"
        --workspace-root "$${BUS_DEV_TASK_WORKSPACE_ROOT}"
        --command-json "$${BUS_DEV_TASK_COMMAND_JSON}"
        --pre-command-json "$${BUS_DEV_TASK_PRE_COMMAND_JSON}"
        --post-command-json "$${BUS_DEV_TASK_POST_COMMAND_JSON}"
        --timeout 30m
    volumes:
      - .:/workspace

  testing-agent:
    image: golang:1.24
    working_dir: /workspace
    depends_on:
      - bus-events
      - bus-api-provider-containers
      - bus-integration-dev-task
    environment:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
      BUS_EVENTS_API_URL: http://bus-events:8081
      BUS_AI_API_URL: http://bus-api-provider-containers:8080
      BUS_CONFIG_DIR: /root/.config/bus
    command:
      - sh
      - -c
      - >-
        mkdir -p /root/.config/bus/auth &&
        cd /workspace/bus-operator-token &&
        go run ./cmd/bus-operator-token --format token issue --local
        --subject local-dev
        --audience ai.hg.fi/api
        --scope 'dev:task:send dev:task:read dev:task:reply dev:task:claim container:read container:run container:delete'
        --ttl 12h > /root/.config/bus/auth/api-token &&
        sleep infinity
    volumes:
      - .:/workspace
