id: bus/workers/appserver
aliases:
  - bus-integration-workers-appserver
  - bus/integration/workers/appserver
  - bus/integration-workers/appserver
  - bus-workers-appserver
name: Bus Workers Codex App Server service
description: Bus Workers service running host-process Codex App Server workers.
service_kind: bus.integration.workers
parameters:
  - name: events_url
    type: string
    description: Bus Events API base URL consumed by the shared integration host.
    default: http://127.0.0.1:8081/local/v1
  - name: token_file
    type: string
    description: Bus Events API bearer token file consumed by the shared integration host.
    default: "{env:BUS_SERVICES_BUS_DIR}/tokens/local-events.jwt"
  - name: codex_auth_home
    type: string
    description: Optional Codex auth/config home copied into isolated App Server worker CODEX_HOME directories.
    default: " "
  - name: default_model
    type: string
    description: Optional default model for App Server workers when a worker create request does not provide one.
    default: " "
  - name: unified_exec
    type: boolean
    description: Enable Codex unified exec for host-process Codex App Server workers.
    default: false
runtime:
  kind: native
  provider: bus
  command:
    - bus
  args:
    - integration
    - --events-url
    - "{param:events_url}"
    - --token-file
    - "{param:token_file}"
    - --provider
    - workers
  env:
    - name: BUS_SERVICES_PROCESS_PATH
      description: Host process search path used when no stack-local Bus tool path is available.
      value_from: process_env:PATH
    - name: PATH
      description: Process search path used to locate Bus dispatcher and module binaries.
      value_from: env:BUS_SERVICES_TOOL_PATH
      default: "{env:BUS_SERVICES_PROCESS_PATH}"
    - name: BUS_SERVICES_BUS_DIR
      description: Durable Bus state directory used for generated service credentials.
      value_from: env:BUS_SERVICES_BUS_DIR
    - name: HOME
      description: Host home directory used to resolve the default Codex auth/config home.
      value_from: process_env:HOME
      default: " "
    - name: SHELL
      description: Host login shell path passed to Codex App Server worker processes.
      value_from: process_env:SHELL
      default: " "
    - name: USER
      description: Host user name passed to Codex App Server worker processes.
      value_from: process_env:USER
      default: " "
    - name: LOGNAME
      description: Host login name passed to Codex App Server worker processes.
      value_from: process_env:LOGNAME
      default: " "
    - name: CODEX_HOME
      description: Host Codex auth/config home used when set.
      value_from: process_env:CODEX_HOME
      default: " "
    - name: BUS_API_TOKEN
      description: Bearer token used by the integration host when calling the Bus Events API.
      value_from: env:BUS_API_TOKEN
      default: " "
    - name: BUS_EVENTS_URL
      description: Bus Events API base URL used to expand the service events_url parameter.
      value_from: env:BUS_EVENTS_URL
      default: http://127.0.0.1:8081/local/v1
    - name: BUS_WORKERS_ENVIRONMENT_ID
      description: Environment id stamped on Workers integration events.
      value_from: env:BUS_WORKERS_ENVIRONMENT_ID
      default: local-dev
    - name: BUS_WORKERS_ENVIRONMENT_NAME
      description: Human-readable environment name reported by worker status.
      value_from: env:BUS_WORKERS_ENVIRONMENT_NAME
      default: Local dev
    - name: BUS_WORKERS_LIFECYCLE
      description: Worker lifecycle mode selected by the Workers integration.
      value_from: env:BUS_WORKERS_LIFECYCLE
      default: appserver-exec
    - name: BUS_WORKERS_APPSERVER_DEFAULT_PROVIDER
      description: Default App Server provider when a worker create request omits runner_provider.
      value_from: env:BUS_WORKERS_APPSERVER_DEFAULT_PROVIDER
      default: codex-appserver
    - name: BUS_WORKERS_DIRECT_REPO_ROOT
      description: Product repository root used when creating task worktrees.
      value_from: env:BUS_WORKERS_DIRECT_REPO_ROOT
      default: "{env:BUS_SERVICES_STACK_DIR}"
    - name: BUS_WORKERS_DIRECT_WORKER_ROOT
      description: Runtime directory for local host-process App Server workers.
      value_from: env:BUS_WORKERS_DIRECT_WORKER_ROOT
      default: .bus/services/workers/runtime
    - name: BUS_WORKERS_DIRECT_WORKER_IDENTITY_REPO
      description: Git repository used for worker identity project data.
      value_from: env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_REPO
      default: "{env:BUS_SERVICES_STACK_DIR}/agents/worker"
    - name: BUS_WORKERS_DIRECT_MODEL
      description: Optional default model assigned to App Server workers when a worker create request does not provide one.
      value_from: env:BUS_WORKERS_DIRECT_MODEL
      default: "{param:default_model}"
    - name: BUS_WORKERS_DIRECT_SANDBOX
      description: Sandbox mode passed to Codex App Server workers.
      value_from: env:BUS_WORKERS_DIRECT_SANDBOX
      default: workspace-write
    - name: BUS_WORKERS_DIRECT_UNIFIED_EXEC
      description: Whether Codex App Server workers should enable unified exec.
      value_from: env:BUS_WORKERS_DIRECT_UNIFIED_EXEC
      default: "{param:unified_exec}"
    - name: BUS_WORKERS_DIRECT_CODEX_COMMAND
      description: Command used to launch the local Codex executable.
      value_from: env:BUS_WORKERS_DIRECT_CODEX_COMMAND
      default: codex
    - name: BUS_WORKERS_DIRECT_CODEX_AUTH_HOME
      description: Explicit Codex auth/config directory copied into each isolated App Server worker CODEX_HOME.
      value_from: env:BUS_WORKERS_DIRECT_CODEX_AUTH_HOME
      default: "{param:codex_auth_home}"
    - name: BUS_WORKERS_DIRECT_BASE_REF
      description: Default Git base ref used for product task worktrees.
      value_from: env:BUS_WORKERS_DIRECT_BASE_REF
      default: HEAD
    - name: BUS_WORKERS_DIRECT_WORKER_IDENTITY_BASE_REF
      description: Default Git base ref used for worker identity worktrees.
      value_from: env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_BASE_REF
      default: HEAD
    - name: BUS_WORKERS_DIRECT_WORKER_IDENTITY_BRANCH_PREFIX
      description: Branch prefix used when materializing worker identity worktrees.
      value_from: env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_BRANCH_PREFIX
      default: worker/
    - name: BUS_WORKERS_DIRECT_WORKSPACE_MATERIALIZER
      description: Workspace materializer used by host-process App Server workers.
      value_from: env:BUS_WORKERS_DIRECT_WORKSPACE_MATERIALIZER
      default: repos-ssh
    - name: BUS_WORKERS_DIRECT_REPOS_ENSURE_TIMEOUT
      description: Timeout for Repos ensure requests made during worktree materialization.
      value_from: env:BUS_WORKERS_DIRECT_REPOS_ENSURE_TIMEOUT
      default: 30s
    - name: BUS_WORKERS_DIRECT_REPOS_SSH_URL_BASE
      description: Base SSH URL used by workers to clone Bus-managed repositories.
      value_from: env:BUS_WORKERS_DIRECT_REPOS_SSH_URL_BASE
      default: ssh://127.0.0.1:2222
    - name: BUS_WORKERS_DIRECT_REPOS_SSH_KEY_FILE
      description: SSH private key generated by the repos SSH service for worker clones and pushes.
      value_from: env:BUS_WORKERS_DIRECT_REPOS_SSH_KEY_FILE
      default: .bus/services/repos-ssh/keys/client_ed25519
    - name: BUS_WORKERS_DIRECT_REPOS_SSH_KNOWN_HOSTS_FILE
      description: known_hosts file generated by the repos SSH service for worker clones and pushes.
      value_from: env:BUS_WORKERS_DIRECT_REPOS_SSH_KNOWN_HOSTS_FILE
      default: .bus/services/repos-ssh/known_hosts
    - name: BUS_WORKERS_DIRECT_MESSAGE_EVIDENCE_TIMEOUT
      description: Timeout while waiting for App Server worker message evidence.
      value_from: env:BUS_WORKERS_DIRECT_MESSAGE_EVIDENCE_TIMEOUT
      default: 3m
    - name: BUS_PREFERENCES_PATH
      description: Bus preferences JSON path used by provider discovery.
      value_from: env:BUS_PREFERENCES_PATH
      default: " "
    - name: BUS_CONFIG_DIR
      description: Bus config root used by provider discovery.
      value_from: env:BUS_CONFIG_DIR
      default: " "
    - name: BUS_AGENT_CODEX_LOCAL_MODEL
      description: Local model selector used by provider discovery.
      value_from: env:BUS_AGENT_CODEX_LOCAL_MODEL
      default: " "
    - name: BUS_AGENT_RUNTIME_MESSAGE_PROVIDER
      description: Optional explicit provider kind for worker message requests.
      value_from: env:BUS_AGENT_RUNTIME_MESSAGE_PROVIDER
      default: " "
    - name: BUS_AGENT_RUNTIME_MESSAGE_BASE_URL
      description: Optional base URL for provider-backed worker message requests.
      value_from: env:BUS_AGENT_RUNTIME_MESSAGE_BASE_URL
      default: " "
    - name: BUS_AGENT_RUNTIME_MESSAGE_MODEL
      description: Optional message model override for worker message requests.
      value_from: env:BUS_AGENT_RUNTIME_MESSAGE_MODEL
      default: " "
    - name: BUS_AGENT_RUNTIME_MESSAGE_TIMEOUT
      description: Optional timeout for provider-backed worker message requests.
      value_from: env:BUS_AGENT_RUNTIME_MESSAGE_TIMEOUT
      default: " "
    - name: OLLAMA_HOST
      description: Ollama host forwarded to worker message requests.
      value_from: env:OLLAMA_HOST
      default: " "
    - name: BUS_WORKERS_APPSERVER_REMOTE_REPO
      description: Repository root used by Codex App Server worker launches.
      value_from: env:BUS_WORKERS_APPSERVER_REMOTE_REPO
      default: "{env:BUS_WORKERS_DIRECT_REPO_ROOT}"
    - name: BUS_WORKERS_APPSERVER_REMOTE_ROOT
      description: Runtime directory for Codex App Server worker launches.
      value_from: env:BUS_WORKERS_APPSERVER_REMOTE_ROOT
      default: .bus/services/workers/appserver
    - name: BUS_WORKERS_APPSERVER_IMAGE
      description: Optional container image used only by non-local App Server plan mode.
      value_from: env:BUS_WORKERS_APPSERVER_IMAGE
      default: bus-integration-task:local-image-smoke
    - name: BUS_WORKERS_APPSERVER_MODEL
      description: Default Codex model for App Server workers.
      value_from: env:BUS_WORKERS_APPSERVER_MODEL
      default: "{param:default_model}"
    - name: BUS_WORKERS_APPSERVER_SANDBOX
      description: Sandbox mode passed to App Server workers.
      value_from: env:BUS_WORKERS_APPSERVER_SANDBOX
      default: danger-full-access
    - name: BUS_WORKERS_APPSERVER_AUTH_HOME
      description: Codex auth/config home mounted into App Server worker launches.
      value_from: env:BUS_WORKERS_APPSERVER_AUTH_HOME
      default: "{param:codex_auth_home}"
    - name: BUS_WORKERS_APPSERVER_PORT_START
      description: First host-local port considered for App Server worker launches.
      value_from: env:BUS_WORKERS_APPSERVER_PORT_START
      default: "19100"
    - name: BUS_WORKERS_APPSERVER_CONTAINER_PREFIX
      description: Optional container name prefix used only by non-local App Server plan mode.
      value_from: env:BUS_WORKERS_APPSERVER_CONTAINER_PREFIX
      default: bus-worker-
