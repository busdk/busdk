id: bus/events/memory
aliases:
  - bus-api-events-memory
  - bus-events-api-memory
  - bus-events-api
  - bus/api/events/memory
  - bus/events-api/memory
name: Bus Events API memory backend
description: Bus Events API provider using the in-memory backend for local development.
service_kind: bus.api.events
runtime:
  kind: native
  provider: bus
  command:
    - bus
  args:
    - api
    - serve
    - --token
    - "{env:BUS_API_CAPABILITY_TOKEN}"
    - --port
    - "8081"
    - --provider
    - events
  env:
    - name: PATH
      value_from: process_env:PATH
    - name: BUS_API_CAPABILITY_TOKEN
      value_from: env:BUS_API_CAPABILITY_TOKEN
      default: local
    - name: BUS_EVENTS_BACKEND
      value: memory
    - name: BUS_EVENTS_JWT_SECRET
      value_from: env:BUS_EVENTS_JWT_SECRET
  ports:
    - name: events-api
      protocol: tcp
      target: 8081
      host: 127.0.0.1
  healthcheck:
    tcp_port: 8081
    interval: 250ms
    timeout: 20s
