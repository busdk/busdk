id: bus/events/postgres
aliases:
  - bus-api-events-postgres
  - bus-events-api-postgres
  - bus/api/events/postgres
  - bus/events-api/postgres
  - bus-events-postgres
name: Bus Events API PostgreSQL backend
description: Bus Events API provider using PostgreSQL as the durable Events backend.
service_kind: bus.api.events
runtime:
  kind: native
  provider: bus
  command:
    - bus
  args:
    - api
    - serve
    - --token
    - "{env:BUS_API_CAPABILITY_TOKEN}"
    - --port
    - "8081"
    - --provider
    - events
  env:
    - name: PATH
      value_from: process_env:PATH
    - name: BUS_API_CAPABILITY_TOKEN
      value_from: env:BUS_API_CAPABILITY_TOKEN
      default: local
    - name: BUS_EVENTS_BACKEND
      value: postgres
    - name: BUS_EVENTS_JWT_SECRET
      value_from: env:BUS_EVENTS_JWT_SECRET
    - name: BUS_EVENTS_POSTGRES_DSN
      value_from: env:BUS_EVENTS_POSTGRES_DSN
  ports:
    - name: events-api
      protocol: tcp
      target: 8081
      host: 127.0.0.1
  healthcheck:
    tcp_port: 8081
    interval: 250ms
    timeout: 20s
