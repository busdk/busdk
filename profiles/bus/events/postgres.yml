id: bus/events/postgres
aliases:
  - bus-api-events-postgres
  - bus-events-api-postgres
  - bus/api/events/postgres
  - bus/events-api/postgres
  - bus-events-postgres
name: Bus Events API PostgreSQL backend
description: Bus Events API provider using PostgreSQL as the durable Events backend.
service_kind: bus.api.events
parameters:
  - name: capability_token
    type: string
    description: Capability path token used in the Bus API base URL.
    default: local
runtime:
  kind: native
  provider: bus
  command:
    - bus
  args:
    - api
    - serve
    - --token
    - "{param:capability_token}"
    - --port
    - "{env:BUS_EVENTS_PORT}"
    - --provider
    - events
  env:
    - name: BUS_SERVICES_PROCESS_PATH
      description: Host process search path used when no stack-local Bus tool path is available.
      value_from: process_env:PATH
    - name: PATH
      description: Process search path used to locate Bus dispatcher and module binaries.
      value_from: env:BUS_SERVICES_TOOL_PATH
      default: "{env:BUS_SERVICES_PROCESS_PATH}"
    - name: BUS_EVENTS_BACKEND
      description: Selects the PostgreSQL Events backend.
      value: postgres
    - name: BUS_API_JWT_SECRET
      description: HS256 secret used by the Events API to validate Bus API bearer tokens.
      value_from: env:BUS_API_JWT_SECRET
    - name: BUS_EVENTS_POSTGRES_DSN
      description: PostgreSQL connection string used as the durable Events backend.
      value_from: env:BUS_EVENTS_POSTGRES_DSN
    - name: BUS_API_IDENTITIES_API_URL
      description: Identities API URL used by the Events provider for JWT/API-key authorization checks.
      value_from: env:BUS_API_IDENTITIES_API_URL
      default: http://127.0.0.1:8091
    - name: BUS_API_IDENTITIES_API_TOKEN
      description: Optional bearer token used by the Events provider for identities API calls.
      value_from: env:BUS_API_IDENTITIES_API_TOKEN
      default: " "
    - name: BUS_API_IDENTITIES_API_TOKEN_FILE
      description: Optional token file used by the Events provider for identities API calls.
      value_from: env:BUS_API_IDENTITIES_API_TOKEN_FILE
      default: " "
    - name: BUS_EVENTS_PORT
      description: TCP port for this Bus Events API process.
      value_from: env:BUS_EVENTS_PORT
      default: "8081"
  ports:
    - name: events-api
      protocol: tcp
      target: 8081
      host: 127.0.0.1
  healthcheck:
    tcp_port_from: env:BUS_EVENTS_PORT
    interval: 250ms
    timeout: 20s
