id: bus/api/local
aliases:
  - bus-api-local
  - bus/api/tasks-workers
  - bus-api-tasks-workers
  - bus-api-workers-tasks
name: Bus API local gateway
description: Bus API gateway with local Auth, Repos, Tasks, and Workers modules enabled.
service_kind: bus.api
parameters:
  - name: capability_token
    type: string
    description: Capability path token used in the Bus API base URL.
    default: local
  - name: providers
    type: string
    description: Comma-separated Bus API providers mounted in the local gateway.
    default: auth,workers,tasks,repos,engine,artifacts
runtime:
  kind: native
  provider: bus
  command:
    - bus
  args:
    - api
    - serve
    - --token
    - "{param:capability_token}"
    - --port
    - "{env:BUS_API_PORT}"
    - --provider
    - "{param:providers}"
  env:
    - name: BUS_SERVICES_PROCESS_PATH
      description: Host process search path used when no stack-local Bus tool path is available.
      value_from: process_env:PATH
    - name: PATH
      description: Process search path used to locate Bus dispatcher and module binaries.
      value_from: env:BUS_SERVICES_TOOL_PATH
      default: "{env:BUS_SERVICES_PROCESS_PATH}"
    - name: BUS_WORKERS_EVENTS_URL
      description: Bus Events API URL used by the Workers API provider.
      value_from: env:BUS_WORKERS_EVENTS_URL
      default: http://127.0.0.1:8081/local/v1
    - name: BUS_TASKS_EVENTS_URL
      description: Bus Events API URL used by the Tasks API provider.
      value_from: env:BUS_TASKS_EVENTS_URL
      default: http://127.0.0.1:8081/local/v1
    - name: BUS_REPOS_EVENTS_URL
      description: Bus Events API URL used by the Repos API provider.
      value_from: env:BUS_REPOS_EVENTS_URL
      default: http://127.0.0.1:8081/local/v1
    - name: BUS_ENGINE_EVENTS_URL
      description: Bus Events API URL used by the Engine API provider.
      value_from: env:BUS_ENGINE_EVENTS_URL
      default: http://127.0.0.1:8081/local/v1
    - name: BUS_AUTH_HS256_SECRET
      description: Required HS256 signing secret used by the Auth provider.
      value_from: env:BUS_AUTH_HS256_SECRET
    - name: BUS_AUTH_INTERNAL_SHARED_KEY
      description: Local internal auth-token bootstrap key; defaults to the local signing secret for development stacks.
      value_from: env:BUS_AUTH_INTERNAL_SHARED_KEY
      default: "{env:BUS_AUTH_HS256_SECRET}"
    - name: BUS_API_JWT_SECRET
      description: Required HS256 verification secret used by mounted API providers.
      value_from: env:BUS_API_JWT_SECRET
      default: "{env:BUS_AUTH_HS256_SECRET}"
    - name: BUS_AUTH_IDENTITIES_API_URL
      description: Internal identities API URL used by the Auth provider.
      value_from: env:BUS_AUTH_IDENTITIES_API_URL
      default: http://127.0.0.1:8091
    - name: BUS_AUTH_STORE_PATH
      description: Durable local Auth provider state file for OTP metadata and revocations.
      value_from: env:BUS_AUTH_STORE_PATH
      default: "{env:BUS_SERVICES_BUS_DIR}/auth/state.json"
    - name: BUS_AUTH_OTP_SENDER
      description: Local OTP sender selector; memory avoids printing OTPs unless explicitly changed.
      value_from: env:BUS_AUTH_OTP_SENDER
      default: memory
    - name: BUS_API_IDENTITIES_API_URL
      description: Identities API URL used by mounted providers for JWT/API-key authorization checks.
      value_from: env:BUS_API_IDENTITIES_API_URL
      default: http://127.0.0.1:8091
    - name: BUS_API_IDENTITIES_API_TOKEN
      description: Optional bearer token used by mounted providers for identities API calls.
      value_from: env:BUS_API_IDENTITIES_API_TOKEN
      default: " "
    - name: BUS_API_IDENTITIES_API_TOKEN_FILE
      description: Optional token file used by mounted providers for identities API calls.
      value_from: env:BUS_API_IDENTITIES_API_TOKEN_FILE
      default: "{env:BUS_SERVICES_BUS_DIR}/tokens/local-events.jwt"
    - name: BUS_API_TOKEN
      description: Bearer token used by API providers when calling the Bus Events API.
      value_from: env:BUS_API_TOKEN
      default: " "
    - name: BUS_TASK_EVENTS_TOKEN_FILE
      description: Explicit Bus Events token file used by the Tasks API provider before inherited process tokens.
      value: "{env:BUS_SERVICES_BUS_DIR}/tokens/local-events.jwt"
    - name: BUS_WORKERS_EVENTS_TOKEN_FILE
      description: Explicit Bus Events token file used by the Workers API provider before inherited process tokens.
      value: "{env:BUS_SERVICES_BUS_DIR}/tokens/local-events.jwt"
    - name: BUS_REPOS_EVENTS_TOKEN_FILE
      description: Explicit Bus Events token file used by the Repos API provider before inherited process tokens.
      value: "{env:BUS_SERVICES_BUS_DIR}/tokens/local-events.jwt"
    - name: BUS_ENGINE_EVENTS_TOKEN_FILE
      description: Explicit Bus Events token file used by the Engine API provider before inherited process tokens.
      value: "{env:BUS_SERVICES_BUS_DIR}/tokens/local-events.jwt"
    - name: BUS_WORKERS_ENVIRONMENT_ID
      description: Current environment id stamped as the origin of worker API Events.
      value_from: env:BUS_WORKERS_ENVIRONMENT_ID
      default: local-dev
    - name: BUS_EVENTS_TOKEN_FILE
      description: Shared Bus Events token file fallback for mounted API providers.
      value: "{env:BUS_SERVICES_BUS_DIR}/tokens/local-events.jwt"
    - name: BUS_API_PORT
      description: TCP port for this Bus API gateway process.
      value_from: env:BUS_API_PORT
      default: "8090"
  ports:
    - name: bus-api
      protocol: tcp
      target: 8090
      host: 127.0.0.1
  healthcheck:
    tcp_port_from: env:BUS_API_PORT
    interval: 250ms
    timeout: 20s
