id: bus/api/local
aliases:
  - bus-api-local
  - bus/api/tasks-workers
  - bus-api-tasks-workers
  - bus-api-workers-tasks
name: Bus API local gateway
description: Bus API gateway with the local Tasks and Workers modules enabled.
service_kind: bus.api
runtime:
  kind: native
  provider: bus
  command:
    - bus
  args:
    - api
    - serve
    - --token
    - "{env:BUS_API_CAPABILITY_TOKEN}"
    - --port
    - "{env:BUS_API_PORT}"
    - --provider
    - workers
    - --provider
    - tasks
    - --enable-module
    - workers
    - --enable-module
    - tasks
  env:
    - name: PATH
      value_from: process_env:PATH
    - name: BUS_WORKERS_EVENTS_URL
      value_from: env:BUS_WORKERS_EVENTS_URL
      default: http://127.0.0.1:8081/local/v1
    - name: BUS_TASKS_EVENTS_URL
      value_from: env:BUS_TASKS_EVENTS_URL
      default: http://127.0.0.1:8081/local/v1
    - name: BUS_API_TOKEN
      value_from: env:BUS_API_TOKEN
    - name: BUS_API_CAPABILITY_TOKEN
      value_from: env:BUS_API_CAPABILITY_TOKEN
      default: local
    - name: BUS_API_PORT
      value_from: env:BUS_API_PORT
      default: "8090"
  ports:
    - name: bus-api
      protocol: tcp
      target: 8090
      host: 127.0.0.1
  healthcheck:
    tcp_port_from: env:BUS_API_PORT
    interval: 250ms
    timeout: 20s
