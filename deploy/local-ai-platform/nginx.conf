events {}

http {
    server {
        listen 8080;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        location = /readyz {
            add_header Content-Type application/json;
            return 200 '{"ok":true,"stack":"bus-local-ai-platform"}\n';
        }

        location /v1/ {
            proxy_pass http://bus-llm:8088;
        }

        location /api/v1/auth/ {
            proxy_pass http://bus-auth:8080/local-dev/v1/api/v1/auth/;
        }

        location /api/internal/auth/ {
            proxy_pass http://bus-auth:8080/local-dev/v1/api/internal/auth/;
        }

        location /api/v1/events {
            proxy_pass http://bus-events:8081;
        }

        location /api/v1/events/ {
            proxy_pass http://bus-events:8081;
        }

        location /api/v1/billing/ {
            proxy_pass http://bus-billing-api:8083;
        }

        location /api/internal/billing/ {
            proxy_pass http://bus-billing-api:8083;
        }

        location /api/internal/usage-events {
            proxy_pass http://bus-usage-api:8082;
        }

        location /api/v1/vm/ {
            proxy_pass http://bus-vm:8085;
        }

        location /api/v1/containers/ {
            proxy_pass http://bus-containers:8086;
        }

        location /api/internal/containers/ {
            proxy_pass http://bus-containers:8086;
        }

        location /api/internal/stripe/webhook {
            proxy_pass http://bus-stripe:8084;
        }
    }
}
