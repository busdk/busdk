version: "0"
env_files:
  - .env
profile_dirs:
  - profiles
default_services:
  - api
groups:
  infrastructure:
    name: Infrastructure
    services:
      - postgres
      - events
  integrations:
    name: Integrations
    services:
      - repos
      - workers
      - tasks
  gateways:
    name: API gateways
    services:
      - api
services:
  postgres:
    profile: postgres/native
  events:
    profile: bus/events/postgres
    depends_on:
      - postgres
  repos:
    profile: bus/repos/local
    depends_on:
      - events
  workers:
    profile: bus/workers/direct
    depends_on:
      - events
      - repos
  tasks:
    profile: bus/tasks/local
    depends_on:
      - events
  api:
    profile: bus/api/local
    depends_on:
      - events
      - workers
      - tasks
