version: "0"
env_files:
  - .env
profile_dirs:
  - profiles
default_services:
  - api
groups:
  infrastructure:
    name: Infrastructure
    services:
      - postgres
      - events
      - events-relay
  security:
    name: Security
    services:
      - identities
  integrations:
    name: Integrations
    services:
      - engine
      - repos
      - repos-ssh
      - workers
      - tasks
  gateways:
    name: API gateways
    services:
      - api
services:
  postgres:
    profile: postgres/native
  events:
    profile: bus/events/postgres
    params:
      capability_token: local
    depends_on:
      - identities
      - postgres
  events-relay:
    profile: bus-events-relay
    depends_on:
      - events
  identities:
    profile: bus/identities/local
  repos:
    profile: bus/repos/local
    params:
      events_url: http://127.0.0.1:8081/local/v1
    depends_on:
      - events
  repos-ssh:
    profile: bus/repos/ssh
    params:
      events_url: http://127.0.0.1:8081/local/v1
    depends_on:
      - events
      - identities
      - repos
  workers:
    profile: bus/workers/appserver
    params:
      events_url: http://127.0.0.1:8081/local/v1
    depends_on:
      - events
      - repos
      - repos-ssh
  tasks:
    profile: bus/tasks/local
    params:
      events_url: http://127.0.0.1:8081/local/v1
    depends_on:
      - events
  engine:
    profile: bus/engine/local
    params:
      events_url: http://127.0.0.1:8081/local/v1
    depends_on:
      - events
  api:
    profile: bus/api/local
    params:
      capability_token: local
    depends_on:
      - identities
      - events
      - engine
      - workers
      - tasks
