version: "1"
env_files:
  - .env
profile_dirs:
  - services/profiles
services:
  postgres:
    profile: postgres-native
  events-api:
    profile: bus-events-api-postgres
    depends_on:
      - postgres
  repos-integration:
    service_kind: bus.integration.repos
    depends_on:
      - events-api
    runtime:
      kind: native
      provider: bus
      command:
        - bus-integration-repos
      env:
        - name: BUS_EVENTS_API_URL
          value_from: env:BUS_EVENTS_API_URL
          default: http://127.0.0.1:8081
        - name: BUS_API_TOKEN
          value_from: env:BUS_API_TOKEN
        - name: BUS_REPOS_ENVIRONMENT_ID
          value_from: env:BUS_WORKERS_ENVIRONMENT_ID
          default: local-dev
        - name: BUS_REPOS_CONFIG
          value_from: env:BUS_REPOS_CONFIG
          default: .bus/services/repos/repositories.json
        - name: BUS_WORKERS_DIRECT_REPO_ROOT
          value_from: env:BUS_WORKERS_DIRECT_REPO_ROOT
        - name: BUS_WORKERS_DIRECT_BASE_REF
          value_from: env:BUS_WORKERS_DIRECT_BASE_REF
          default: HEAD
        - name: BUS_WORKERS_DIRECT_WORKER_IDENTITY_REPO
          value_from: env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_REPO
        - name: BUS_WORKERS_DIRECT_WORKER_IDENTITY_BASE_REF
          value_from: env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_BASE_REF
          default: HEAD
      options:
        init:
          command:
            - /bin/sh
          args:
            - -c
            - >-
              mkdir -p "$(dirname "{env:BUS_REPOS_CONFIG}")" &&
              printf '%s\n' '{"repositories":[{"id":"product","path":"{env:BUS_WORKERS_DIRECT_REPO_ROOT}","default_base_ref":"{env:BUS_WORKERS_DIRECT_BASE_REF}"},{"id":"worker-identity","path":"{env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_REPO}","default_base_ref":"{env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_BASE_REF}"}]}' > "{env:BUS_REPOS_CONFIG}"
          creates: "{env:BUS_REPOS_CONFIG}"
  workers-integration:
    service_kind: bus.integration.workers
    depends_on:
      - events-api
      - repos-integration
    runtime:
      kind: native
      provider: bus
      command:
        - bus-integration-workers
      args:
        - --lifecycle
        - direct-exec
      env:
        - name: BUS_EVENTS_API_URL
          value_from: env:BUS_EVENTS_API_URL
          default: http://127.0.0.1:8081
        - name: BUS_API_TOKEN
          value_from: env:BUS_API_TOKEN
        - name: BUS_WORKERS_ENVIRONMENT_ID
          value_from: env:BUS_WORKERS_ENVIRONMENT_ID
          default: local-dev
        - name: BUS_WORKERS_ENVIRONMENT_NAME
          value_from: env:BUS_WORKERS_ENVIRONMENT_NAME
          default: Local dev
        - name: BUS_WORKERS_DIRECT_REPO_ROOT
          value_from: env:BUS_WORKERS_DIRECT_REPO_ROOT
        - name: BUS_WORKERS_DIRECT_WORKER_ROOT
          value_from: env:BUS_WORKERS_DIRECT_WORKER_ROOT
          default: .bus/services/workers/runtime
        - name: BUS_WORKERS_DIRECT_WORKER_IDENTITY_REPO
          value_from: env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_REPO
        - name: BUS_WORKERS_DIRECT_MODEL
          value_from: env:BUS_WORKERS_DIRECT_MODEL
          default: gpt-5.3-codex-spark
        - name: BUS_WORKERS_DIRECT_SANDBOX
          value_from: env:BUS_WORKERS_DIRECT_SANDBOX
          default: workspace-write
        - name: BUS_WORKERS_DIRECT_CODEX_COMMAND
          value_from: env:BUS_WORKERS_DIRECT_CODEX_COMMAND
          default: codex
        - name: BUS_WORKERS_DIRECT_BASE_REF
          value_from: env:BUS_WORKERS_DIRECT_BASE_REF
          default: HEAD
        - name: BUS_WORKERS_DIRECT_WORKER_IDENTITY_BASE_REF
          value_from: env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_BASE_REF
          default: HEAD
        - name: BUS_WORKERS_DIRECT_WORKER_IDENTITY_BRANCH_PREFIX
          value_from: env:BUS_WORKERS_DIRECT_WORKER_IDENTITY_BRANCH_PREFIX
          default: worker/
        - name: BUS_WORKERS_DIRECT_WORKSPACE_MATERIALIZER
          value_from: env:BUS_WORKERS_DIRECT_WORKSPACE_MATERIALIZER
          default: repos-events
        - name: BUS_WORKERS_DIRECT_REPOS_ENSURE_TIMEOUT
          value_from: env:BUS_WORKERS_DIRECT_REPOS_ENSURE_TIMEOUT
          default: 30s
        - name: BUS_WORKERS_DIRECT_MESSAGE_EVIDENCE_TIMEOUT
          value_from: env:BUS_WORKERS_DIRECT_MESSAGE_EVIDENCE_TIMEOUT
          default: 3m
  bus-api:
    service_kind: bus.api
    depends_on:
      - events-api
      - workers-integration
    runtime:
      kind: native
      provider: bus
      command:
        - bus-api
      args:
        - serve
        - --token
        - "{env:BUS_API_CAPABILITY_TOKEN}"
        - --port
        - "{env:BUS_API_PORT}"
        - --provider
        - workers
        - --enable-module
        - workers
      env:
        - name: BUS_WORKERS_EVENTS_URL
          value_from: env:BUS_WORKERS_EVENTS_URL
          default: http://127.0.0.1:8081
        - name: BUS_API_TOKEN
          value_from: env:BUS_API_TOKEN
        - name: BUS_API_CAPABILITY_TOKEN
          value_from: env:BUS_API_CAPABILITY_TOKEN
          default: local
        - name: BUS_API_PORT
          value_from: env:BUS_API_PORT
          default: "8090"
      ports:
        - name: bus-api
          protocol: tcp
          target: 8090
          host: 127.0.0.1
      healthcheck:
        tcp_port_from: env:BUS_API_PORT
        interval: 250ms
        timeout: 20s
