name: ${BUS_LOCAL_AI_PLATFORM_PROJECT_NAME:-bus-local-ai-platform}

x-go-service: &go-service
  image: ${BUS_LOCAL_GO_IMAGE:-golang:1.26.3}
  working_dir: /workspace
  volumes:
    - .:/workspace
  environment: &go-env
    PATH: /workspace/.busdk-tools/bin:/usr/local/go/bin:/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    CGO_ENABLED: "0"
    BUS_AUTH_HS256_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
    BUS_API_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
    BUS_LLM_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
    BUS_USAGE_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
    BUS_BILLING_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
    BUS_VM_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
    BUS_CONTAINERS_JWT_SECRET: ${BUS_LOCAL_JWT_SECRET:-not-a-secret-local-development-hs256-key}
    BUS_AUTH_POSTGRES_DSN: postgres://${LOCAL_AI_PLATFORM_POSTGRES_USER:-bus}:${LOCAL_AI_PLATFORM_POSTGRES_PASSWORD:-bus}@postgres:5432/${LOCAL_AI_PLATFORM_POSTGRES_DB:-bus_local}?sslmode=disable
    BUS_EVENTS_POSTGRES_DSN: postgres://${LOCAL_AI_PLATFORM_POSTGRES_USER:-bus}:${LOCAL_AI_PLATFORM_POSTGRES_PASSWORD:-bus}@postgres:5432/${LOCAL_AI_PLATFORM_POSTGRES_DB:-bus_local}?sslmode=disable
    BUS_USAGE_DATABASE_URL: postgres://${LOCAL_AI_PLATFORM_POSTGRES_USER:-bus}:${LOCAL_AI_PLATFORM_POSTGRES_PASSWORD:-bus}@postgres:5432/${LOCAL_AI_PLATFORM_POSTGRES_DB:-bus_local}?sslmode=disable
    BUS_BILLING_DATABASE_URL: postgres://${LOCAL_AI_PLATFORM_POSTGRES_USER:-bus}:${LOCAL_AI_PLATFORM_POSTGRES_PASSWORD:-bus}@postgres:5432/${LOCAL_AI_PLATFORM_POSTGRES_DB:-bus_local}?sslmode=disable
    BUS_DATA_POSTGRES_DSN: postgres://${LOCAL_AI_PLATFORM_POSTGRES_USER:-bus}:${LOCAL_AI_PLATFORM_POSTGRES_PASSWORD:-bus}@postgres:5432/${LOCAL_AI_PLATFORM_POSTGRES_DB:-bus_local}?sslmode=disable
    BUS_EVENTS_API_URL: http://bus-events:8081
    BUS_EVENTS_LISTENER_RETRY: "true"
    BUS_EVENTS_LISTENER_RETRY_MIN: 250ms
    BUS_EVENTS_LISTENER_RETRY_MAX: 5s
    BUS_AI_API_URL: http://nginx:8080
    BUS_API_BASE_URL: http://nginx:8080
    BUS_NOTES_API_URL: http://nginx:8080/api
    BUS_LOCAL_ACCOUNT_ID: ${BUS_LOCAL_ACCOUNT_ID:-00000000-0000-4000-8000-000000000001}
    BUS_LOCAL_TOKEN_SCOPES: ${BUS_LOCAL_TOKEN_SCOPES:-events:send events:listen llm:proxy usage:write usage:read usage:delete billing:read billing:setup billing:entitlement:check billing:subscription:write billing:usage:export billing:provider vm:read vm:write container:read container:run container:delete container:admin ssh:run cloud:read cloud:write cloud:destroy database:read database:admin node:read node:admin inference:read inference:admin notes.read notes.read.private notes.write notes.write.draft notes.delete notes.search notes.import.memo_file notes.import.task_summary notes.import.session_summary notes.publish notes.retention.admin work:send work:reply work:claim work:read dev:task:send dev:task:reply dev:task:claim dev:task:read}

x-codex-image-build: &codex-image-build
  context: ./deploy/local-ai-platform/codex
  args:
    GO_VERSION: ${BUS_LOCAL_GO_VERSION:-1.26.3}
    CODEX_VERSION: ${BUS_LOCAL_CODEX_VERSION:-0.135.0}
    CODEX_NPM_PACKAGE: ${BUS_LOCAL_CODEX_NPM_PACKAGE:-@openai/codex}
    CODEX_NPM_VERSION: ${BUS_LOCAL_CODEX_NPM_VERSION:-}
    CODEX_LINUX_AMD64_SHA256: ${BUS_LOCAL_CODEX_LINUX_AMD64_SHA256:-a15e7dad657da4a0e120eede29556fee6d50e8c919759cc2ecba3c99099363e2}
    CODEX_LINUX_ARM64_SHA256: ${BUS_LOCAL_CODEX_LINUX_ARM64_SHA256:-568bce1d593ef25ffdf5549369a8606085652294646a5c4961547a894ea2f76d}

services:
  postgres:
    image: ${BUS_LOCAL_POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_DB: ${LOCAL_AI_PLATFORM_POSTGRES_DB:-bus_local}
      POSTGRES_USER: ${LOCAL_AI_PLATFORM_POSTGRES_USER:-bus}
      POSTGRES_PASSWORD: ${LOCAL_AI_PLATFORM_POSTGRES_PASSWORD:-bus}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:${LOCAL_AI_PLATFORM_POSTGRES_PORT:-15432}:5432"
    volumes:
      - local-ai-platform-postgres:/var/lib/postgresql/data

  mailhog:
    image: ${BUS_LOCAL_MAILHOG_IMAGE:-mailhog/mailhog:latest}
    logging:
      driver: none
    ports:
      - "127.0.0.1:${LOCAL_AI_PLATFORM_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${LOCAL_AI_PLATFORM_MAILHOG_PORT:-8025}:8025"

  bus-local-token:
    <<: *go-service
    working_dir: /workspace/bus-operator-token
    command:
      - sh
      - -ec
      - |
        mkdir -p /workspace/tmp/local-ai-platform/bus-config/auth
        go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h > /workspace/tmp/local-ai-platform/bus-config/auth/api-token
        chmod 600 /workspace/tmp/local-ai-platform/bus-config/auth/api-token

  bus-events:
    <<: *go-service
    working_dir: /workspace/bus-api-provider-events
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - go
      - run
      - ./cmd/bus-api-provider-events
      - --addr
      - 0.0.0.0:8081
      - --events-backend
      - postgres

  bus-auth:
    <<: *go-service
    working_dir: /workspace/bus-api
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      <<: *go-env
      BUS_AUTH_INTERNAL_SHARED_KEY: ${BUS_AUTH_INTERNAL_SHARED_KEY:-not-a-secret-local-development-internal-key}
      BUS_AUTH_OTP_SENDER: smtp
      BUS_AUTH_SMTP_HOST: mailhog
      BUS_AUTH_SMTP_PORT: "1025"
      BUS_AUTH_SMTP_FROM: ${BUS_AUTH_SMTP_FROM:-bus-auth@example.invalid}
    command:
      - go
      - run
      - ./cmd/bus-api
      - serve
      - --listen
      - 0.0.0.0
      - --port
      - "8080"
      - --token
      - local-dev
      - --provider
      - auth

  bus-usage-api:
    <<: *go-service
    working_dir: /workspace/bus-api-provider-usage
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - go
      - run
      - ./cmd/bus-api-provider-usage
      - --addr
      - 0.0.0.0:8082

  bus-usage-worker:
    <<: *go-service
    working_dir: /workspace/bus-integration-usage
    depends_on:
      bus-events:
        condition: service_started
      postgres:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-integration-usage --events-url http://bus-events:8081 --usage-backend postgres

  bus-billing-api:
    <<: *go-service
    working_dir: /workspace/bus-api-provider-billing
    depends_on:
      bus-events:
        condition: service_started
      postgres:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-api-provider-billing --addr 0.0.0.0:8083 --backend events --events-url http://bus-events:8081

  bus-billing-worker:
    <<: *go-service
    working_dir: /workspace/bus-integration-billing
    depends_on:
      bus-events:
        condition: service_started
      postgres:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-integration-billing --events-url http://bus-events:8081 --store-backend postgres --provider-backend ${BUS_LOCAL_BILLING_PROVIDER_BACKEND:-local}

  bus-notes-api:
    <<: *go-service
    working_dir: /workspace/bus-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *go-env
      BUS_NOTES_WORKSPACE_ROOT: ${BUS_NOTES_WORKSPACE_ROOT:-/workspace/tmp/local-ai-platform/notes-workspace}
    command:
      - sh
      - -ec
      - |
        exec go run -tags 'busdk_notes,busdk_concrete,busdk_busdata' ./cmd/bus-api serve --listen 0.0.0.0 --port 8092 --token local-dev --provider notes

  bus-stripe:
    <<: *go-service
    working_dir: /workspace/bus-integration-stripe
    depends_on:
      bus-events:
        condition: service_started
    environment:
      <<: *go-env
      BUS_STRIPE_WEBHOOK_SECRET: ${BUS_STRIPE_WEBHOOK_SECRET:-whsec_local_not_secret}
      BUS_STRIPE_SECRET_KEY: ${BUS_STRIPE_SECRET_KEY:-}
      BUS_STRIPE_DEFAULT_PRICE_ID: ${BUS_STRIPE_DEFAULT_PRICE_ID:-}
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-integration-stripe --events-url http://bus-events:8081 --webhook-addr 0.0.0.0:8084

  bus-vm:
    <<: *go-service
    working_dir: /workspace/bus-api-provider-vm
    depends_on:
      bus-events:
        condition: service_started
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-api-provider-vm --addr 0.0.0.0:8085 --backend static --usage-backend memory --billing-backend none --events-url http://bus-events:8081

  bus-containers:
    <<: *go-service
    working_dir: /workspace/bus-api-provider-containers
    depends_on:
      bus-events:
        condition: service_started
      bus-container-router:
        condition: service_started
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-api-provider-containers --addr 0.0.0.0:8086 --backend events --usage-backend memory --billing-backend none --events-url http://bus-events:8081

  bus-docker:
    <<: *go-service
    working_dir: /workspace/bus-integration-docker
    depends_on:
      bus-events:
        condition: service_started
      bus-codex:
        condition: service_started
    environment:
      <<: *go-env
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
      BUS_DOCKER_EVENT_PREFIX: bus.docker
      DOCKER_CONTAINER_CODEX_IMAGE: ${DOCKER_CONTAINER_CODEX_IMAGE:-bus-local-codex:dev}
      BUS_DOCKER_CODEX_HOME_HOST: ${BUS_DOCKER_CODEX_HOME_HOST:-${BUS_CODEX_HOME:-${HOME}/.codex}}
      BUS_DOCKER_CODEX_HOME_WRITABLE: ${BUS_DOCKER_CODEX_HOME_WRITABLE:-false}
      BUS_DOCKER_CODEX_SSH_HOST: ${BUS_DOCKER_CODEX_SSH_HOST:-${HOME}/.ssh}
      BUS_DOCKER_CODEX_SSH_AGENT_HOST: ${BUS_DOCKER_CODEX_SSH_AGENT_HOST:-${SSH_AUTH_SOCK:-}}
      BUS_DOCKER_CODEX_GIT_SSH_COMMAND: ${BUS_DOCKER_CODEX_GIT_SSH_COMMAND:-ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/bus-known-hosts}
      BUS_DOCKER_CODEX_WORKSPACE_HOST: ${BUS_DOCKER_CODEX_WORKSPACE_HOST:-${PWD}}
      BUS_DOCKER_CODEX_WORKSPACE_CONTAINER: ${BUS_DOCKER_CODEX_WORKSPACE_CONTAINER:-/workspace}
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        codex_home_writable_flag=
        if [ "$${BUS_DOCKER_CODEX_HOME_WRITABLE}" = "true" ] || [ "$${BUS_DOCKER_CODEX_HOME_WRITABLE}" = "1" ]; then
          codex_home_writable_flag="--codex-home-writable"
        fi
        exec go run ./cmd/bus-integration-docker --provider docker --events-url http://bus-events:8081 --event-prefix bus.docker --container-codex-image "$${DOCKER_CONTAINER_CODEX_IMAGE}" --codex-home-host-path "$${BUS_DOCKER_CODEX_HOME_HOST}" $$codex_home_writable_flag --codex-ssh-host-path "$${BUS_DOCKER_CODEX_SSH_HOST}" --codex-ssh-agent-host-path "$${BUS_DOCKER_CODEX_SSH_AGENT_HOST}" --codex-git-ssh-command "$${BUS_DOCKER_CODEX_GIT_SSH_COMMAND}" --codex-workspace-host-path "$${BUS_DOCKER_CODEX_WORKSPACE_HOST}" --codex-workspace-container-path "$${BUS_DOCKER_CODEX_WORKSPACE_CONTAINER}"

  bus-container-router:
    <<: *go-service
    working_dir: /workspace/bus-integration-containers
    depends_on:
      bus-events:
        condition: service_started
      bus-docker:
        condition: service_started
    environment:
      <<: *go-env
      BUS_CONTAINERS_PROVIDER: events
      BUS_CONTAINERS_BACKEND_EVENT_PREFIX: bus.docker
      BUS_CONTAINERS_REQUEST_TIMEOUT: 30m
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-integration-containers --provider events --events-url http://bus-events:8081 --backend-event-prefix bus.docker --request-timeout 30m

  codex-image:
    profiles: ["dev-task"]
    image: ${BUS_LOCAL_CODEX_IMAGE:-bus-local-codex:dev}
    pull_policy: build
    build: *codex-image-build
    command:
      - codex
      - --version

  bus-integration-task:
    profiles: ["dev-task"]
    <<: *go-service
    image: ${BUS_LOCAL_CODEX_IMAGE:-bus-local-codex:dev}
    pull_policy: build
    build: *codex-image-build
    working_dir: /workspace/bus-integration-task
    group_add:
      - ${BUS_DOCKER_SOCKET_CONTAINER_GID:-65534}
    depends_on:
      codex-image:
        condition: service_completed_successfully
      bus-events:
        condition: service_started
      bus-containers:
        condition: service_started
      bus-container-router:
        condition: service_started
      bus-docker:
        condition: service_started
    environment:
      <<: *go-env
      BUS_NOTES_API_URL: ${BUS_NOTES_API_URL:-http://bus-notes-api:8092/local-dev/v1}
      BUS_API_URL: ${BUS_API_URL:-http://bus-notes-api:8092/local-dev/v1}
      BUS_DEV_TASK_POLICY_FILE: ${BUS_DEV_TASK_POLICY_FILE:-/workspace/config/dev-task-lifecycle-policy.json}
      BUS_DEV_TASK_RECIPIENT: ${BUS_DEV_TASK_RECIPIENT:-bus-dev}
      BUS_DEV_TASK_WORK_REF: ${BUS_DEV_TASK_WORK_REF:-}
      BUS_DEV_TASK_AGENT_BACKEND: ${BUS_DEV_TASK_AGENT_BACKEND:-codex-appserver}
      BUS_DEV_TASK_CODEX_COMMAND: ${BUS_DEV_TASK_CODEX_COMMAND:-codex}
      BUS_DEV_TASK_CODEX_ARGS: ${BUS_DEV_TASK_CODEX_ARGS:-["app-server","-c","approval_policy=\"never\"","-c","shell_environment_policy.inherit=all"]}
      BUS_DEV_TASK_CODEX_MODEL: ${BUS_DEV_TASK_CODEX_MODEL:-auto}
      BUS_DEV_TASK_CODEX_APPROVAL_POLICY: ${BUS_DEV_TASK_CODEX_APPROVAL_POLICY:-never}
      BUS_DEV_TASK_CODEX_SANDBOX: ${BUS_DEV_TASK_CODEX_SANDBOX:-workspace-write}
      BUS_DEV_TASK_CODEX_NETWORK_ACCESS: ${BUS_DEV_TASK_CODEX_NETWORK_ACCESS:-true}
      BUS_DEV_TASK_CODEX_INHERIT_ENV: ${BUS_DEV_TASK_CODEX_INHERIT_ENV:-true}
      BUS_DEV_TASK_GO_DEBUGGER: ${BUS_DEV_TASK_GO_DEBUGGER:-auto}
      BUS_DEV_TASK_GO_DEBUGGER_COMMAND: ${BUS_DEV_TASK_GO_DEBUGGER_COMMAND:-dlv}
      BUS_LINT_AGENT: ${BUS_LINT_AGENT:-codex}
      BUS_DEV_TASK_CONTAINER_PROFILE: ${BUS_DEV_TASK_CONTAINER_PROFILE:-codex}
      BUS_DEV_TASK_WORKSPACE_ROOT: ${BUS_DEV_TASK_WORKSPACE_ROOT:-/workspace}
      BUS_DEV_TASK_WORKSPACE_HOST_ROOT: ${BUS_DEV_TASK_WORKSPACE_HOST_ROOT:-${PWD}}
      BUS_DEV_TASK_WORKSPACE_RECIPIENT: ${BUS_DEV_TASK_WORKSPACE_RECIPIENT:-busdk}
      BUS_DEV_TASK_WORKTREE: ${BUS_DEV_TASK_WORKTREE:-true}
      BUS_DEV_TASK_WORKTREE_ROOT: ${BUS_DEV_TASK_WORKTREE_ROOT:-/workspace/tmp/bus-dev-task-worktrees}
      BUS_DEV_TASK_COMMAND_JSON: ${BUS_DEV_TASK_COMMAND_JSON:-["codex","exec","--skip-git-repo-check","--sandbox","danger-full-access","{prompt}"]}
      BUS_DEV_TASK_PRE_COMMAND_JSON: ${BUS_DEV_TASK_PRE_COMMAND_JSON:-[]}
      BUS_DEV_TASK_POST_COMMAND_JSON: "[]"
      BUS_DEV_TASK_COMMIT: ${BUS_DEV_TASK_COMMIT:-true}
      BUS_DEV_TASK_COMMIT_MESSAGE: "${BUS_DEV_TASK_COMMIT_MESSAGE:-chore: dev task {work_ref}}"
      BUS_DEV_TASK_TIMEOUT: ${BUS_DEV_TASK_TIMEOUT:-30m}
      BUS_DEV_TASK_ONCE: ${BUS_DEV_TASK_ONCE:-false}
      BUS_DEV_TASK_IDLE_TIMEOUT: ${BUS_DEV_TASK_IDLE_TIMEOUT:-0}
      BUS_DEV_TASK_CODEX_SOURCE_HOME: ${BUS_DEV_TASK_CODEX_SOURCE_HOME:-/root/.codex-shared}
      BUS_DEV_TASK_CODEX_STATE_ROOT: ${BUS_DEV_TASK_CODEX_STATE_ROOT:-/workspace/tmp/bus-dev-task-codex-homes}
      DOCKER_HOST: ${BUS_DOCKER_HOST:-unix:///var/run/docker.sock}
      BUS_E2E_DOCKER_HOST: ${BUS_E2E_DOCKER_HOST:-host.docker.internal}
      GOCACHE: ${BUS_DEV_TASK_GOCACHE:-/tmp/bus-go-build-cache}
      GOMODCACHE: ${BUS_DEV_TASK_GOMODCACHE:-/go/pkg/mod}
      GOPATH: ${BUS_DEV_TASK_GOPATH:-/go}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -ec
      - |
        /workspace/scripts/busdk-refresh-tools.sh --refresh-only
        if [ -z "$${CODEX_HOME:-}" ]; then
          export CODEX_HOME="$${BUS_DEV_TASK_CODEX_STATE_ROOT}/launcher-$${BUS_DEV_TASK_RECIPIENT:-worker}-$${HOSTNAME:-local}"
          mkdir -p "$${CODEX_HOME}"
          for codex_file in auth.json config.toml; do
            if [ -f "$${BUS_DEV_TASK_CODEX_SOURCE_HOME}/$${codex_file}" ]; then
              cp "$${BUS_DEV_TASK_CODEX_SOURCE_HOME}/$${codex_file}" "$${CODEX_HOME}/$${codex_file}"
              chmod 600 "$${CODEX_HOME}/$${codex_file}" || true
            fi
          done
        fi
        if [ "$${BUS_DEV_TASK_AGENT_BACKEND}" = "codex-appserver" ]; then
          export BUS_DEV_TASK_COMMAND_JSON="[]"
        fi
        if [ -z "$${BUS_API_TOKEN:-}" ]; then
          export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        fi
        export BUS_NOTES_API_TOKEN="$${BUS_NOTES_API_TOKEN:-$${BUS_API_TOKEN}}"
        set -- go run ./cmd/bus-integration-task --events-url http://bus-events:8081
        if [ -n "$${BUS_DEV_TASK_RECIPIENT}" ]; then
          set -- "$$@" --recipient "$${BUS_DEV_TASK_RECIPIENT}"
        fi
        if [ -n "$${BUS_DEV_TASK_POLICY_FILE:-}" ]; then
          set -- "$$@" --policy-file "$${BUS_DEV_TASK_POLICY_FILE}"
        fi
        if [ -n "$${BUS_DEV_TASK_WORK_REF:-}" ]; then
          set -- "$$@" --work-ref "$${BUS_DEV_TASK_WORK_REF}"
        fi
        set -- "$$@" --agent-backend "$${BUS_DEV_TASK_AGENT_BACKEND}" --codex-command "$${BUS_DEV_TASK_CODEX_COMMAND}" --codex-args-json "$${BUS_DEV_TASK_CODEX_ARGS}" --codex-model "$${BUS_DEV_TASK_CODEX_MODEL}" --codex-approval-policy "$${BUS_DEV_TASK_CODEX_APPROVAL_POLICY}" --codex-sandbox "$${BUS_DEV_TASK_CODEX_SANDBOX}" --codex-network-access="$${BUS_DEV_TASK_CODEX_NETWORK_ACCESS}" --codex-state-root "$${BUS_DEV_TASK_CODEX_STATE_ROOT}" --codex-inherit-env="$${BUS_DEV_TASK_CODEX_INHERIT_ENV}" --go-debugger "$${BUS_DEV_TASK_GO_DEBUGGER}" --go-debugger-command "$${BUS_DEV_TASK_GO_DEBUGGER_COMMAND}" --container-profile "$${BUS_DEV_TASK_CONTAINER_PROFILE}" --workspace-root "$${BUS_DEV_TASK_WORKSPACE_ROOT}" --workspace-host-root "$${BUS_DEV_TASK_WORKSPACE_HOST_ROOT}" --workspace-recipient "$${BUS_DEV_TASK_WORKSPACE_RECIPIENT}" --worktree="$${BUS_DEV_TASK_WORKTREE}" --worktree-root "$${BUS_DEV_TASK_WORKTREE_ROOT}" --command-json "$${BUS_DEV_TASK_COMMAND_JSON}" --pre-command-json "$${BUS_DEV_TASK_PRE_COMMAND_JSON}" --post-command-json "$${BUS_DEV_TASK_POST_COMMAND_JSON}" --commit="$${BUS_DEV_TASK_COMMIT}" --commit-message "$${BUS_DEV_TASK_COMMIT_MESSAGE}" --timeout "$${BUS_DEV_TASK_TIMEOUT}" --once="$${BUS_DEV_TASK_ONCE}" --idle-timeout "$${BUS_DEV_TASK_IDLE_TIMEOUT}"
        exec "$$@"
    volumes:
      - .:/workspace
      - ${BUS_CODEX_HOME:-${HOME}/.codex}:/root/.codex-shared:ro
      - ${BUS_GO_MOD_CACHE_HOST:-${HOME}/go/pkg/mod}:/go/pkg/mod:ro
      - ${BUS_DOCKER_SOCKET_HOST:-/var/run/docker.sock}:/var/run/docker.sock

  bus-dev-supervisor:
    profiles: ["dev-task"]
    <<: *go-service
    working_dir: /workspace
    depends_on:
      bus-events:
        condition: service_started
      bus-integration-task:
        condition: service_started
    environment:
      <<: *go-env
      BUS_DEV_SUPERVISOR_STATE_DIR: ${BUS_DEV_SUPERVISOR_STATE_DIR:-/workspace/tmp/dev-task-supervisor}
      BUS_DEV_SUPERVISOR_INTERVAL_SECONDS: ${BUS_DEV_SUPERVISOR_INTERVAL_SECONDS:-300}
      BUS_DEV_SUPERVISOR_MAX_AGE_SECONDS: ${BUS_DEV_SUPERVISOR_MAX_AGE_SECONDS:-900}
      BUS_DEV_SUPERVISOR_QUIET_AFTER: ${BUS_DEV_SUPERVISOR_QUIET_AFTER:-15m}
      BUS_DEV_SUPERVISOR_STALE_AFTER: ${BUS_DEV_SUPERVISOR_STALE_AFTER:-1h}
      BUS_DEV_SUPERVISOR_ONCE: ${BUS_DEV_SUPERVISOR_ONCE:-false}
    command:
      - sh
      - -ec
      - |
        /workspace/scripts/busdk-refresh-tools.sh --refresh-only
        mkdir -p /root/.config/bus/auth
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        printf '%s\n' "$${BUS_API_TOKEN}" > /root/.config/bus/auth/api-token
        exec /workspace/scripts/dev-task-supervisor-heartbeat.sh run
    healthcheck:
      test: ["CMD-SHELL", "/workspace/scripts/dev-task-supervisor-heartbeat.sh check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  bus-codex:
    image: ${BUS_LOCAL_CODEX_IMAGE:-bus-local-codex:dev}
    pull_policy: build
    build: *codex-image-build
    working_dir: /workspace/bus-integration-codex
    volumes:
      - .:/workspace
      - ${BUS_CODEX_HOME:-${HOME}/.codex}:/root/.codex-shared:ro
    depends_on:
      bus-events:
        condition: service_started
    environment:
      <<: *go-env
      BUS_CODEX_PROVIDER: ${BUS_CODEX_PROVIDER:-codex}
      BUS_CODEX_WORKDIR: ${BUS_CODEX_WORKDIR:-/workspace}
      BUS_CODEX_MODEL: ${BUS_CODEX_MODEL:-auto}
      BUS_CODEX_COMMAND: ${BUS_CODEX_COMMAND:-codex}
      BUS_CODEX_SOURCE_HOME: ${BUS_CODEX_SOURCE_HOME:-/root/.codex-shared}
      CODEX_HOME: ${BUS_CODEX_RUNTIME_HOME:-/tmp/bus-codex-home}
    command:
      - sh
      - -ec
      - |
        /workspace/scripts/busdk-refresh-tools.sh --refresh-only
        mkdir -p "$${CODEX_HOME}"
        for codex_file in auth.json config.toml; do
          if [ -f "$${BUS_CODEX_SOURCE_HOME}/$${codex_file}" ]; then
            cp "$${BUS_CODEX_SOURCE_HOME}/$${codex_file}" "$${CODEX_HOME}/$${codex_file}"
            chmod 600 "$${CODEX_HOME}/$${codex_file}" || true
          fi
        done
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-integration-codex --provider "$${BUS_CODEX_PROVIDER}" --events-url http://bus-events:8081 --workdir "$${BUS_CODEX_WORKDIR}" --model "$${BUS_CODEX_MODEL}" --codex-command "$${BUS_CODEX_COMMAND}"

  bus-llm:
    <<: *go-service
    working_dir: /workspace/bus-api-provider-llm
    depends_on:
      bus-events:
        condition: service_started
      bus-codex:
        condition: service_started
    environment:
      <<: *go-env
      BUS_LLM_EXECUTION_BACKEND: events
      BUS_LLM_MODEL_CATALOG: /workspace/deploy/local-ai-platform/model-catalog.json
    command:
      - sh
      - -ec
      - |
        export BUS_API_TOKEN="$$(cd /workspace/bus-operator-token && go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h)"
        exec go run ./cmd/bus-api-provider-llm --addr 0.0.0.0:8088 --execution-backend events --usage-backend events --runtime-backend none --billing-backend ${BUS_LLM_BILLING_BACKEND:-none} --events-url http://bus-events:8081

  bus-portal:
    <<: *go-service
    working_dir: /workspace/bus-portal
    depends_on:
      bus-auth:
        condition: service_started
      bus-billing-api:
        condition: service_started
      bus-containers:
        condition: service_started
      bus-llm:
        condition: service_started
    environment:
      <<: *go-env
      BUS_PORTAL_API_CONNECT_SRC: http://127.0.0.1:${LOCAL_AI_PLATFORM_PORT:-8080}
      BUS_PORTAL_TOKEN: ${BUS_PORTAL_TOKEN:-local-dev}
    command:
      - sh
      - -ec
      - |
        exec go run ./cmd/bus-portal -C /workspace serve --listen 0.0.0.0 --port 8090 --token "$${BUS_PORTAL_TOKEN}" --print-url --enable-module auth --enable-module ai --enable-module accounting --experimental --api-connect-src "http://127.0.0.1:${LOCAL_AI_PLATFORM_PORT:-8080}"

  nginx:
    image: ${BUS_LOCAL_NGINX_IMAGE:-nginx:1.27-alpine}
    depends_on:
      bus-auth:
        condition: service_started
      bus-events:
        condition: service_started
      bus-usage-api:
        condition: service_started
      bus-billing-api:
        condition: service_started
      bus-stripe:
        condition: service_started
      bus-vm:
        condition: service_started
      bus-containers:
        condition: service_started
      bus-notes-api:
        condition: service_started
      bus-container-router:
        condition: service_started
      bus-llm:
        condition: service_started
      bus-portal:
        condition: service_started
    ports:
      - "127.0.0.1:${LOCAL_AI_PLATFORM_PORT:-8080}:8080"
    volumes:
      - ./deploy/local-ai-platform/nginx.conf:/etc/nginx/nginx.conf:ro

  testing-agent:
    profiles: ["dev-task"]
    <<: *go-service
    depends_on:
      bus-events:
        condition: service_started
      bus-containers:
        condition: service_started
      bus-integration-task:
        condition: service_started
      bus-dev-supervisor:
        condition: service_started
    environment:
      <<: *go-env
      BUS_AI_API_URL: http://bus-containers:8086
      BUS_EVENTS_API_URL: http://bus-events:8081
    command:
      - sh
      - -ec
      - |
        mkdir -p /root/.config/bus/auth
        cd /workspace/bus-operator-token
        go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/api --scope "$${BUS_LOCAL_TOKEN_SCOPES}" --ttl 12h > /root/.config/bus/auth/api-token
        go run ./cmd/bus-operator-token --format token issue --local --subject "$${BUS_LOCAL_ACCOUNT_ID}" --audience ai.hg.fi/auth --scope "waitlist:read waitlist:approve admin:manage" --ttl 12h > /root/.config/bus/auth/auth-token
        exec sleep infinity

volumes:
  local-ai-platform-postgres:
